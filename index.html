<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sonic Traces Player</title>
  <link rel="stylesheet" href="/style.css?v=2">
</head>
<body>
  <main id="app">
    <button
      id="playerButton"
      class="player-button"
      type="button"
      aria-label="Enable sound"
      title="Enable sound"
    >
      <span class="record-ring" aria-hidden="true"></span>
      <span id="playerIcon" class="player-icon play" aria-hidden="true"></span>
    </button>

    <p id="playerHint" class="player-hint">enable sound</p>

    <audio id="audioPlayer" preload="none"></audio>
  </main>

  <script src="/tableau.extensions.1.latest.js"></script>
  <script src="/player.js?v=2"></script>
</body>
</html>
